<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For My Dhabuu 💜</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      font-family:'Poppins',sans-serif;
      background: radial-gradient(circle at top, #2a004f, #000);
      color:white;
      overflow-x:hidden;
    }

    header{
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
    }

    h1{
      font-family:'Great Vibes',cursive;
      font-size:4rem;
    }

    .typing{
      border-right:2px solid white;
      white-space:nowrap;
      overflow:hidden;
      animation:typing 4s steps(40,end), blink .8s infinite;
    }

    @keyframes typing{from{width:0}to{width:100%}}
    @keyframes blink{50%{border-color:transparent}}

    .btn{
      margin-top:20px;
      padding:12px 25px;
      border:none;
      border-radius:30px;
      background:#ff4d6d;
      color:white;
      cursor:pointer;
    }

    section{padding:60px 20px;text-align:center;}

    .card{
      max-width:600px;
      margin:auto;
      background:rgba(255,255,255,0.1);
      padding:30px;
      border-radius:20px;
      backdrop-filter:blur(10px);
    }

    .gallery{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
      margin-top:30px;
    }

    .slider {
  max-width: 400px;
  margin: auto;
}

.slider img {
  width: 100%;
  border-radius: 20px;
  transition: 1s;
}

    .heart{
      position:fixed;
      bottom:-20px;
      animation:float 6s linear infinite;
    }

    @keyframes float{
      0%{transform:translateY(0);opacity:1}
      100%{transform:translateY(-100vh);opacity:0}
    }

    .star{
      position:fixed;
      width:2px;height:2px;
      background:white;
      animation:twinkle 2s infinite alternate;
    }

    @keyframes twinkle{from{opacity:0.2}to{opacity:1}}

    footer{padding:30px;opacity:0.7;text-align:center;}
  </style>
</head>
<body>

<header>
  <h1>Happy Birthday 💜</h1>
  <h2 class="typing">My Dhabuu ✨</h2>
  <button class="btn" onclick="go('message')">Start 💌</button>
</header>

<section id="message">
  <div class="card">
    <p id="msg1"></p>
  </div>
</section>

<section>
  <button class="btn" onclick="showMoments()">📸 See Our Moments</button>

  <div id="moments" style="display:none;margin-top:20px;">
    <h2>Our Moments 📸</h2>
    <div class="slider">
      <img id="slide" src="photo1.jpg">
    </div>
  </div>
</section>

<section>
  <button class="btn" onclick="showWhy()">💜 Why You Matter To Me</button>

  <div id="why" style="display:none;margin-top:20px;">
    <div class="card">
      <p id="msgWhy"></p>
    </div>
  </div>
</section>

<section>
  <button class="btn" onclick="showSpecial()">💌 Special Message</button>
  <div id="special" style="display:none;margin-top:20px;">
    <div class="card">
      <p id="msg4"></p>
    </div>
  </div>
</section>

<section>
  <button class="btn" onclick="showFinal()">One Last Thing 💖</button>
  <div id="final" style="display:none;margin-top:20px;">
    <h2>I Care About You 💜</h2>
    <p id="msg5" style="margin-top:20px;"></p>
    
  </div>
</section>

<footer>Made with love for My Dhabuu 💜</footer>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mp3">
</audio>

<script>
function typeText(id, text, speed = 40) {
  let i = 0;
  const el = document.getElementById(id);
  el.innerHTML = "";

  function typing() {
    if (i < text.length) {

      // pause for ...
      if (text.substring(i, i+3) === "...") {
        el.innerHTML += "...";
        i += 3;
        setTimeout(typing, 600);
        return;
      }

      // pause for |
      if (text.charAt(i) === "|") {
        i++;
        setTimeout(typing, 1000);
        return;
      }

      el.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    }
  }

  typing();
}
function go(id){
  typeText('msg1', "Happy Birthday Dhabuu! You didn’t just come into my life… you became a special part of it 💜 And honestly… everything feels a Much better because of you. I hope this day is as special as you are to me. You deserve all the happiness in the world. I care about you so much and I'm grateful to have you in my life. Wishing you a day filled with love, laughter, and unforgettable moments. 💜✨", 80);
  
  document.getElementById(id).scrollIntoView({behavior:'smooth'});

  // play music on first interaction
  const music = document.getElementById('music');
  music.volume = 0;
  music.play();

  // smooth fade-in
  let vol = 0;
  const fade = setInterval(() => {
    if (vol < 1) {
      vol += 0.05;
      music.volume = vol;
    } else {
      clearInterval(fade);
    }
  }, 200);
} 
function showWhy(){
  document.getElementById('why').style.display='block';

  // clear previous text
  document.getElementById('msgWhy').innerHTML = "";

  // typing effect
  typeText("msgWhy",
`• Your smile changes my mood instantly 😊

• You are soft, cute, beautiful, kind and real 💖

• Being with you feels like home that I never imagined ✨ You are the person that I can share my deepest thoughts with, Your presence brings me comfort and joy, and I cherish every moment we spend togethe.and I'm grateful to have you in my life. and I hope you always know how much you mean to me. 💜✨`, 80);
}
function showSpecial(){
  document.getElementById('special').style.display='block';

  // clear previous text (IMPORTANT)
  document.getElementById('msg4').innerHTML = "";

  // start typing again
  typeText("msg4",
`I don’t know the perfect words... | but I’ll still try 💜

From the moment you came into my life... something felt different... | something felt right ✨

You are not just special... | you are someone I truly care about I care about you more than words can express 💖

I just want you to always stay happy... 😊

And maybe one day... | I’ll say everything that I feel 💜`, 80);
}
function showFinal(){
  document.getElementById('final').style.display='block';

  document.getElementById('msg5').innerHTML = "";

  typeText("msg5",
`More than you think... | more than I show ✨

You are the person I trust without hesitation 💜

And someone I can imagine walking through life with 💖`, 80);
}

setInterval(()=>{
  let h=document.createElement('div');
  h.className='heart';
  h.innerHTML='💜';
  h.style.left=Math.random()*100+'vw';
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},400);

for(let i=0;i<50;i++){
  let s=document.createElement('div');
  s.className='star';
  s.style.top=Math.random()*100+'vh';
  s.style.left=Math.random()*100+'vw';
  document.body.appendChild(s);
}

// image slider
const images = [
  'photo1.jpg',
  'photo2.jpg',
  'photo3.jpg',
  'photo4.jpg',
  'photo5.jpg',
  'photo6.jpg',
  'photo7.jpg',
  'photo8.jpg',
  'photo9.jpg',
  'photo10.jpg',
  'photo11.jpg',
  'photo12.jpg',
  'photo13.jpg',
  'photo14.jpg',
  'photo15.jpg'
];
let sliderStarted = false;

function startSlider(){
  if(sliderStarted) return; // prevent multiple starts
  sliderStarted = true;

  setInterval(() => {
    i = (i + 1) % images.length;
    document.getElementById('slide').src = images[i];
  }, 2500);
}
function showMoments(){
  document.getElementById('moments').style.display = 'block';
  startSlider();
}
</script>

</body>
</html>
